lofi:
  stations:
    - name: Lofi Girl
      url: https://www.youtube.com/watch?v=jfKfPfyJRdk
      description: 24/7 lofi hip hop radio — beats to relax/study to. The iconic livestream, perfect for calm focus sessions.
      tags: [calm, focus, studying, relaxed, chill]
    - name: Chillhop Music
      url: https://www.youtube.com/watch?v=5yx6BWlEVcY
      description: Jazzy & lofi hip hop beats with a warm, coffee-shop feel. Mellow but groovy.
      tags: [calm, focus, warm, coffee-shop, productive]
jazz:
  stations:
    - name: Coffee Shop Radio
      url: https://www.youtube.com/watch?v=VMAPTo7RVCo
      description: 24/7 coffee shop jazz radio — relaxing jazz for work & study. Warm and inviting, like background music at your favorite cafe.
      tags: [warm, relaxed, productive, coffee-shop, studying]
    - name: SomaFM - Fluid
      url: http://ice4.somafm.com/fluid-128-mp3
      description: Instrumental hip-hop, future soul, and liquid trap. Beats-forward with jazz sensibility. Great bridge between lofi and jazz.
      tags: [creative, building, flowing, modern, beats]
    - name: SomaFM - Bossa Beyond
      url: http://ice4.somafm.com/bossa-128-mp3
      description: Silky-smooth Brazilian bossa nova, samba, and beyond. Warm, laid-back, sophisticated. Best for relaxed but productive work.
      tags: [relaxed, sophisticated, warm, productive, elegant]
    - name: WDCB Jazz
      url: http://wdcb-ice.streamguys.org:80/wdcb128
      description: Chicago's home for jazz — listener-supported public radio. Straight-ahead jazz, standards, and contemporary jazz with professional curation.
      tags: [traditional, classic, refactoring, building, focus]

classical:
  stations:
    - name: Classical Piano Music & Fireplace 24/7 - Mozart, Chopin, Beethoven, Bach, Grieg, Schumann, Satie
      url: https://www.youtube.com/watch?v=y6TZHLAzg5o
      description: 24/7 classical piano with cozy fireplace ambience — Mozart, Chopin, Beethoven, Bach, Grieg, Schumann, Satie. Warm and focused.
      tags: [focus, deep-work, studying, warm, cozy, piano]
    - name: All Classical Portland
      url: http://allclassical-ice.streamguys.com/ac96kmp3
      description: Portland's independent community-funded classical music station. Well-curated, broad repertoire, professional presentation.
      tags: [focus, code-review, research, contemplative, curated]
    - name: France Musique
      url: http://direct.francemusique.fr/live/francemusique-midfi.mp3
      description: France's national public radio devoted to classical music. European classical tradition with excellent orchestral programming.
      tags: [orchestral, contemplative, elegant, deep-work, focus]

ambient:
  stations:
    - name: SomaFM - Groove Salad
      url: http://ice2.somafm.com/groovesalad-128-mp3
      description: A nicely chilled plate of ambient/downtempo beats and grooves. SomaFM's most popular channel — the quintessential coding music stream.
      tags: [calm, focus, debugging, testing, devops, chill, coding]
    - name: Relaxing Ambient
      url: https://www.youtube.com/watch?v=S_MOd40zlYU
      description: 24/7 ambient relaxation radio — calm atmospheric music. A reliable YouTube livestream for quiet background ambience.
      tags: [calm, relaxed, background, quiet, gentle]
    - name: SomaFM - Drone Zone
      url: http://ice2.somafm.com/dronezone-128-mp3
      description: Served best chilled — atmospheric textures with minimal beats. Very spa-like, meditative, zero distractions. Best for deep creative work or maximum calm.
      tags: [zen, meditative, deep-work, brainstorming, calm, minimal]
    - name: SomaFM - Deep Space One
      url: http://ice4.somafm.com/deepspaceone-128-mp3
      description: Deep ambient electronic and space music for inner and outer exploration. More musical than Drone Zone with melodic elements and occasional structure.
      tags: [creative, inspired, exploration, thinking, melodic]
    - name: SomaFM - Mission Control
      url: http://ice2.somafm.com/missioncontrol-128-mp3
      description: Ambient music mixed with NASA mission audio — Houston comms blended with ambient music. Inspiring for anything space or exploration themed.
      tags: [inspired, exploration, unique, space, building]
    - name: SomaFM - Dark Zone
      url: http://ice2.somafm.com/darkzone-128-mp3
      description: The darker side of deep ambient — brooding, mysterious textures. For when you want ambient with more weight and atmosphere. Good for intense focus sessions.
      tags: [dark, intense, focus, brooding, deep-work]
    - name: Stereoscenic Ambient
      url: http://radio.stereoscenic.com/asp-h
      description: Tranquil and deep ambient — lush environments painted with sound. Continuous soundscapes that blend into the background, clean and unobtrusive.
      tags: [background, calm, unobtrusive, planning, quiet]

electronic:
  stations:
    - name: SomaFM - Beat Blender
      url: http://ice2.somafm.com/beatblender-128-mp3
      description: A late night blend of deep-house and downtempo chill. Deeper, bass-driven electronic. Good for late sessions.
      tags: [late-night, chill, deep, bass, steady]
    - name: SomaFM - The Trip
      url: http://ice2.somafm.com/thetrip-128-mp3
      description: Progressive house and trance — tip-top tunes with building energy and euphoric peaks. Best for sustained high-energy coding.
      tags: [high-energy, sprint, shipping, excited, pumped, driving]
    - name: SomaFM - Cliqhop IDM
      url: http://ice2.somafm.com/cliqhop-128-mp3
      description: Blips, beeps, and intricate beats — Intelligent Dance Music. Cerebral electronic that rewards attention. Good for algorithmic or logic-heavy work.
      tags: [cerebral, algorithms, logic, intricate, focus]
    - name: SomaFM - Dub Step Beyond
      url: http://ice2.somafm.com/dubstep-128-mp3
      description: Dubstep, dub, and deep bass — heavy and rhythmic. For when you need raw energy and drive. May damage speakers at high volume.
      tags: [energy, intense, heavy, driving, pumped]
    - name: SomaFM - Suburbs of Goa
      url: http://ice2.somafm.com/suburbsofgoa-128-mp3
      description: Desi-influenced Asian world beats and beyond. Trancey, hypnotic grooves with Indian and Middle Eastern flavors. Great for getting into a rhythmic flow.
      tags: [flow, hypnotic, rhythmic, trance, world]
    - name: SomaFM - Groove Salad Classic
      url: http://ice2.somafm.com/gsclassic-128-mp3
      description: The early 2000s version of ambient/downtempo beats and grooves. Slightly rawer, more trip-hop influenced. Nostalgia factor.
      tags: [nostalgic, chill, retro, trip-hop, relaxed]

